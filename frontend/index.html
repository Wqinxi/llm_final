<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 美食助手😋</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(90deg, #fff1e6 0%, #f6efe0 30%, #f6efe0 70%, #fff1e6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .page-shell {
            position: relative;
            z-index: 1;
            width: min(100%, 1080px);
            max-width: 1080px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(184, 120, 77, 0.16);
            border-radius: 28px;
            box-shadow: 0 24px 58px rgba(100, 52, 22, 0.12);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .page-header {
            background: linear-gradient(135deg, #e67e22, #f1c40f);
            color: #fff;
            padding: 18px 24px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .page-subtitle {
            color: rgba(255, 245, 230, 0.95);
            margin-top: 6px;
            font-size: 13px;
            opacity: 0.88;
        }
        .page-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 18px 22px 22px;
        }
        .chat-panel {
            background: linear-gradient(180deg, #fefcf6 0%, #fff5eb 100%);
            border: 1px solid rgba(210, 149, 118, 0.18);
            border-radius: 28px;
            padding: 16px;
            min-height: 360px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            margin-bottom: 10px;
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble {
            max-width: 78%;
            padding: 16px 18px;
            border-radius: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 10px 24px rgba(159, 108, 70, 0.08);
        }
        .message.user .bubble {
            background: #e67e22;
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .message.assistant .bubble {
            background: #fff7eb;
            color: #1f3a5f;
            border: 1px solid rgba(227, 194, 149, 0.4);
            border-bottom-left-radius: 6px;
        }
        .message.user .bubble img,
        .message.assistant .bubble img {
            max-width: 100%;
            border-radius: 14px;
            display: block;
            margin-top: 12px;
        }
        .input-area {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: end;
            background: #ffffff;
            border: 1px solid rgba(184, 120, 77, 0.16);
            border-radius: 24px;
            padding: 18px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.45);
        }
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .image-preview-bar {
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(230, 126, 34, 0.08);
            border: 1px solid rgba(230, 126, 34, 0.2);
            border-radius: 16px;
        }
        .image-preview-bar.active { display: flex; }
        .img-wrap {
            display: none;
            align-items: center;
            gap:8px;
        }
        .img-wrap.show { display: flex; }
        .image-preview-bar img {
            height: 60px;
            width: 60px;
            border-radius: 14px;
            border: 1px solid #f5e0d0;
            object-fit: cover;
        }
        .image-preview-bar button {
            height: 34px;
            padding: 0 12px;
            background: #fb6f55;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
        }
        .file-preview-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #f5e0d0;
        }
        .file-preview-item span {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-preview-item button {
            background: #fb6f55;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            padding: 2px 8px;
            cursor: pointer;
        }
        #fileListBox {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        #fileInput {
            display: none;
        }
        textarea {
            width: 100%;
            border: 1px solid rgba(184, 120, 77, 0.18);
            border-radius: 18px;
            padding: 14px 16px;
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 40vh;
            min-height: 48px;
            line-height: 1.6;
            font-family: inherit;
            background: #f7f8fb;
            color: #1c2b4a;
            overflow: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        textarea::-webkit-scrollbar{display:none}
        textarea:focus { border-color: #e67e22; background: #fff; }
        button#sendBtn {
            height: 50px;
            min-width: 118px;
            padding: 0 24px;
            background: linear-gradient(135deg, #f39c12, #f1c40f);
            color: #5c3a1e;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        button#sendBtn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        button#sendBtn:disabled { background: #f5d38a; cursor: not-allowed; transform: none; }
        .loading {
            color: #9e7b60;
            font-style: italic;
        }
        .drop-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(19, 72, 128, 0.34);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            z-index: 1000;
            pointer-events: none;
        }
        .drop-overlay.active { display: flex; }

        /* ========== 气泡内流程日志面板样式 ========== */
        .agent-log-box {
            margin-bottom: 12px;
            border: 1px solid #ebd4c5;
            border-radius: 12px;
            overflow: hidden;
            background: #fffaf7;
        }
        .agent-log-header {
            padding: 8px 12px;
            background: #fee8d8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .agent-log-header span {
            font-size: 13px;
            color: #6b422c;
        }
        .agent-log-toggle {
            border: none;
            background: #e67e22;
            color: white;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .agent-log-content {
            padding: 10px 12px;
            max-height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            color: #222;
        }
        .agent-log-content.fold {
            display: none;
        }
        .final-answer-text {
            white-space: pre-wrap;
        }

        @media (max-width: 800px) {
            body { padding: 20px; }
            .page-shell { border-radius: 26px; }
            .page-content { padding: 22px 20px 26px; }
            .page-header { font-size: 22px; padding: 24px 20px; }
            .input-area { grid-template-columns: 1fr auto auto; }
            button#sendBtn { min-width: 90px; padding: 0 14px; }
        }

        /* ========== 模式切换 ========== */
        .mode-switch { position: relative; display: flex; align-items: center; }
        .mode-btn {
            height: 50px; width: 44px;
            background: #f7f8fb;
            border: 1px solid rgba(184,120,77,0.18);
            border-radius: 14px;
            cursor: pointer; color: #e67e22;
            font-size: 16px; display: flex;
            align-items: center; justify-content: center;
            transition: background .2s;
        }
        .mode-btn:hover { background: #fff5eb; }
        .mode-menu {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            right: 0;
            background: #fff;
            border: 1px solid #e0d5cd;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            min-width: 170px;
            overflow: hidden;
            z-index: 100;
        }
        .mode-menu.show { display: block; }
        .mode-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .mode-item:hover { background: #fff5eb; }
        .mode-item.active { color: #e67e22; font-weight: 600; }
        .mode-check { font-size: 13px; }

        /* ========== 构建模式上传区域 ========== */
        .upload-btn-area {
            width: 100%;
            border: 2px dashed rgba(184,120,77,0.3);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
            color: #9e7b60;
            font-size: 15px;
            cursor: pointer;
            background: #f7f8fb;
            transition: all .2s ease;
            display: none;
            line-height: 1.5;
        }
        .upload-btn-area.show { display: block; }
        .upload-btn-area:hover,
        .upload-btn-area.dragover {
            border-color: #e67e22;
            background: #fff5eb;
            color: #e67e22;
        }

        /* ========== 构建进度面板 ========== */
        .build-log-box {
            margin-bottom: 12px;
            border: 1px solid #ebd4c5;
            border-radius: 12px;
            overflow: hidden;
            background: #fffaf7;
        }
        .build-log-header {
            padding: 8px 12px;
            background: #fee8d8;
            font-size: 13px;
            color: #6b422c;
            font-weight: 600;
        }
        .build-log-content {
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #222;
        }
        .build-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #f5e0d0;
        }
        .build-file-item:last-child { border-bottom: none; }
        .build-file-name { max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .build-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .build-status.building { background: #e67e22; color: white; }
        .build-status.saved { background: #3498db; color: white; }
        .build-status.done { background: #27ae60; color: white; }
        .build-status.error { background: #e74c3c; color: white; }

        /* ========== 背景食物图片流 ========== */
        .food-flow-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.32;
        }
        .food-flow-row {
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
            gap: 40px;
            width: max-content;
            will-change: transform;
        }
        .food-flow-row.row1 { top: 25%; transform: translateY(-50%); animation: flowLeft 30s linear infinite; }
        .food-flow-row.row2 { top: 50%; transform: translateY(-50%); animation: flowLeft 36s linear infinite; animation-delay: -12s; }
        .food-flow-row.row3 { top: 75%; transform: translateY(-50%); animation: flowLeft 42s linear infinite; }
        .food-flow-row img {
            width: 132px;
            height: 132px;
            border-radius: 24px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
        }
        @keyframes flowLeft {
            0% { transform: translateY(-50%) translateX(0); }
            100% { transform: translateY(-50%) translateX(-50%); }
        }

        /* ========== 点击食物emoji特效 ========== */
        .click-emoji {
            position: fixed;
            pointer-events: none;
            font-size: 26px;
            z-index: 9999;
            animation: emojiPop 0.9s ease-out forwards;
        }
        @keyframes emojiPop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.4); }
            25% { transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="food-flow-bg">
        <div class="food-flow-row row1"></div>
        <div class="food-flow-row row2"></div>
        <div class="food-flow-row row3"></div>
    </div>
    <div class="page-shell">
        <div class="page-header">
            AI 美食助手😋
        </div>
        <div class="page-content">
            <div class="chat-panel">
                <div class="chat-container" id="chatContainer"></div>
            </div>
            <div class="input-area" id="inputArea">
                <div class="input-wrapper">
                    <div class="image-preview-bar" id="imagePreview">
                        <div class="img-wrap" id="imgWrap">
                            <img id="previewImg" src="" alt="preview">
                            <button onclick="clearImage()">删除图片</button>
                        </div>
                        <div id="fileListBox"></div>
                        <input type="file" id="fileInput" accept=".txt,.md,.pdf,.doc,.docx" multiple>
                    </div>
                    <textarea id="userInput" placeholder="输入消息，或拖拽图片/文档到页面..." rows="1"></textarea>
                    <div id="uploadBtnArea" class="upload-btn-area">点击或拖拽上传文档（支持 pdf, txt, md, doc, docx）</div>
                </div>
                <div class="mode-switch">
                    <button class="mode-btn" id="modeBtn" onclick="toggleModeMenu()" title="切换模式">▲</button>
                    <div class="mode-menu" id="modeMenu">
                        <div class="mode-item active" data-mode="chat" onclick="setMode('chat')">
                            <span>知识问答</span><span class="mode-check" id="check-chat">✓</span>
                        </div>
                        <div class="mode-item" data-mode="build" onclick="setMode('build')">
                            <span>构建知识库</span><span class="mode-check" id="check-build" style="visibility:hidden;">✓</span>
                        </div>
                    </div>
                </div>
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
    <div class="drop-overlay" id="dropOverlay">释放以上传图片/文档</div>

    <script>
        async function initFoodFlow() {
            let allImages = [];
            try {
                const res = await fetch('/flow-images');
                if (res.ok) {
                    const data = await res.json();
                    allImages = data.images || [];
                }
            } catch (e) {
                console.error('加载食物图片列表失败', e);
            }
            if (!allImages.length) return;

            const rows = document.querySelectorAll('.food-flow-row');
            const rowImages = [[], [], []];
            allImages.forEach((src, i) => {
                rowImages[i % 3].push(src);
            });

            rows.forEach((row, idx) => {
                row.innerHTML = '';
                const imgs = rowImages[idx] || [];
                if (!imgs.length) return;
                imgs.forEach(src => {
                    const img = document.createElement('img');
                    img.src = `/data/flow_images/${encodeURIComponent(src)}`;
                    img.alt = '';
                    row.appendChild(img);
                });
                const unitWidth = row.scrollWidth;
                let copies = Math.ceil((window.innerWidth * 2.5) / unitWidth);
                if (copies < 2) copies = 2;
                if (copies % 2 !== 0) copies += 1;
                for (let i = 1; i < copies; i++) {
                    imgs.forEach(src => {
                        const img = document.createElement('img');
                        img.src = `/data/flow_images/${encodeURIComponent(src)}`;
                        img.alt = '';
                        row.appendChild(img);
                    });
                }
            });
        }
        window.addEventListener('load', initFoodFlow);
        window.addEventListener('resize', () => {
            clearTimeout(window._flowResizeTimer);
            window._flowResizeTimer = setTimeout(initFoodFlow, 200);
        });

        const foodEmojis = ['🍕','🍔','🍟','🌭','🍿','🥓','🥚','🥞','🥐','🥨','🥯','🥖','🧀','🥗','🥙','🥪','🌮','🌯','🥫','🍖','🍗','🥩','🍠','🥟','🥠','🥡','🍱','🍘','🍙','🍚','🍛','🍜','🍝','🍢','🍣','🍤','🍥','🍡','🍦','🍧','🍨','🍩','🍪','🎂','🍰','🧁','🥧','🍫','🍬','🍭','🍮','🍯','🍎','🍏','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🍈','🍒','🍑','🍍','🥝','🥑','🥦','🥬','🥒','🌶️','🌽','🥕','🥔','🍆','🥜','🌰','🍄','🥥','🍞','🥣','🍴','🥢','🍽️','🥄','🍺','🍻','🥂','🍷','🥃','🍸','🍹','🍾','🍶','🍵','☕','🥛','🍼','🥤','🧃','🧉'];
        document.addEventListener('click', function(e) {
            const emoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
            const el = document.createElement('div');
            el.className = 'click-emoji';
            el.textContent = emoji;
            el.style.left = e.clientX + 'px';
            el.style.top = e.clientY + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 900);
        });

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const imgWrap = document.getElementById('imgWrap');
        const dropOverlay = document.getElementById('dropOverlay');
        const fileInput = document.getElementById('fileInput');
        const fileListBox = document.getElementById('fileListBox');

        let messages = [];
        let pendingImage = null;
        let pendingFiles = [];
        let eventSource = null;
        let currentAssistantWrap = null;
        let currentLogContentEl = null;
        let currentAnswerTextEl = null;
        let logFoldState = false;
        let currentMode = 'chat';
        let buildFiles = [];
        let buildFileStatusMap = {};
        let currentBuildLogBox = null;

        const modeBtn = document.getElementById('modeBtn');
        const modeMenu = document.getElementById('modeMenu');
        const uploadBtnArea = document.getElementById('uploadBtnArea');
        const checkChat = document.getElementById('check-chat');
        const checkBuild = document.getElementById('check-build');

        function toggleModeMenu() {
            modeMenu.classList.toggle('show');
        }
        window.toggleModeMenu = toggleModeMenu;

        function setMode(mode) {
            currentMode = mode;
            modeMenu.classList.remove('show');

            // 更新菜单勾选状态
            document.querySelectorAll('.mode-item').forEach(el => {
                el.classList.toggle('active', el.dataset.mode === mode);
            });
            checkChat.style.visibility = mode === 'chat' ? 'visible' : 'hidden';
            checkBuild.style.visibility = mode === 'build' ? 'visible' : 'hidden';

            if (mode === 'build') {
                userInput.style.display = 'none';
                uploadBtnArea.classList.add('show');
                sendBtn.textContent = '上传并构建';
                // 清空问答模式的 pending 文件/图片
                pendingImage = null;
                previewImg.src = '';
                imgWrap.classList.remove('show');
                pendingFiles = [];
                renderFileList();
                // 构建模式也清空
                buildFiles = [];
                renderBuildFileList();
                imagePreview.classList.remove('active');
            } else {
                userInput.style.display = 'block';
                uploadBtnArea.classList.remove('show');
                sendBtn.textContent = '发送';
                // 清空构建模式的文件
                buildFiles = [];
                renderBuildFileList();
                // 问答模式也清空
                pendingFiles = [];
                pendingImage = null;
                previewImg.src = '';
                imgWrap.classList.remove('show');
                renderFileList();
                imagePreview.classList.remove('active');
            }
        }
        window.setMode = setMode;

        // 点击页面其它区域关闭模式菜单
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.mode-switch')) {
                modeMenu.classList.remove('show');
            }
        });

        // 构建模式上传区域交互
        uploadBtnArea.addEventListener('click', function(e) {
            if (e.target === uploadBtnArea) {
                fileInput.click();
            }
        });
        uploadBtnArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadBtnArea.classList.add('dragover');
        });
        uploadBtnArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadBtnArea.classList.remove('dragover');
        });
        uploadBtnArea.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadBtnArea.classList.remove('dragover');
            Array.from(e.dataTransfer.files).forEach(f => handleBuildFile(f));
        });

        function handleBuildFile(file) {
            const allowSuffix = ['.txt', '.md', '.pdf', '.doc', '.docx'];
            if (!allowSuffix.some(s => file.name.toLowerCase().endsWith(s))) {
                alert('仅支持 pdf, txt, md, doc, docx 格式文档');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(evt) {
                buildFiles.push({
                    name: file.name,
                    base64: evt.target.result,
                    type: file.type
                });
                renderBuildFileList();
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        function renderBuildFileList() {
            fileListBox.innerHTML = '';
            buildFiles.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'file-preview-item';
                div.innerHTML = `<span>${item.name}</span><button onclick="removeBuildFile(${idx})">删除</button>`;
                fileListBox.appendChild(div);
            });
        }
        window.removeBuildFile = function(idx) {
            buildFiles.splice(idx, 1);
            renderBuildFileList();
            if (!buildFiles.length) imagePreview.classList.remove('active');
        }

        // 在对话面板中插入构建进度消息
        function appendBuildProgressMessage() {
            const wrap = document.createElement('div');
            wrap.className = 'message assistant';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            const logBox = document.createElement('div');
            logBox.className = 'build-log-box';

            const header = document.createElement('div');
            header.className = 'build-log-header';
            header.textContent = '📚 构建知识库';

            const content = document.createElement('div');
            content.className = 'build-log-content';
            content.id = 'buildLogContent' + Date.now();

            logBox.appendChild(header);
            logBox.appendChild(content);
            bubble.appendChild(logBox);
            wrap.appendChild(bubble);
            chatContainer.appendChild(wrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return content;
        }

        function updateBuildFileStatus(contentEl, fileName, status, msg) {
            let row = contentEl.querySelector(`[data-file="${CSS.escape(fileName)}"]`);
            if (!row) {
                row = document.createElement('div');
                row.className = 'build-file-item';
                row.dataset.file = fileName;
                row.innerHTML = `<span class="build-file-name">${fileName}</span><span class="build-status ${status}">${_statusText(status, msg)}</span>`;
                contentEl.appendChild(row);
            } else {
                const statusEl = row.querySelector('.build-status');
                statusEl.className = 'build-status ' + status;
                statusEl.textContent = _statusText(status, msg);
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function _statusText(status, msg) {
            const map = { saved: '已保存', building: '构建中...', done: '已完成', error: msg || '失败' };
            return map[status] || status;
        }

        function addBuildLogText(contentEl, text) {
            const div = document.createElement('div');
            div.style.marginBottom = '4px';
            div.textContent = text;
            contentEl.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 输入框自适应高度
        function adjustInputHeight(el) {
            el.style.height = 'auto';
            const max = Math.floor(window.innerHeight * 0.4);
            const h = Math.min(el.scrollHeight, max);
            el.style.height = h + 'px';
        }
        adjustInputHeight(userInput);
        userInput.addEventListener('input', function() {
            adjustInputHeight(this);
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 拖拽监听
        let dragCounter = 0;
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropOverlay.classList.add('active');
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dropOverlay.classList.remove('active');
            }
        });
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');
            const files = e.dataTransfer.files;
            if (currentMode === 'build') {
                Array.from(files).forEach(f => handleBuildFile(f));
            } else {
                Array.from(files).forEach(f => handleUploadFile(f));
            }
        });

        // 文件选择弹窗监听
        fileInput.addEventListener('change', () => {
            if (currentMode === 'build') {
                Array.from(fileInput.files).forEach(f => handleBuildFile(f));
            } else {
                Array.from(fileInput.files).forEach(f => handleUploadFile(f));
            }
            fileInput.value = '';
        });

        // 统一处理上传文件
        function handleUploadFile(file) {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    pendingImage = evt.target.result;
                    previewImg.src = pendingImage;
                    imgWrap.classList.add('show');
                    imagePreview.classList.add('active');
                };
                reader.readAsDataURL(file);
            } else {
                const allowSuffix = ['.txt', '.md', '.pdf', '.doc', '.docx'];
                const fileName = file.name.toLowerCase();
                let isAllow = false;
                for (let s of allowSuffix) {
                    if (fileName.endsWith(s)) {
                        isAllow = true;
                        break;
                    }
                }
                if (!isAllow) {
                    alert('仅支持 txt、md、pdf、doc、docx 格式文档');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(evt) {
                    pendingFiles.push({
                        name: file.name,
                        base64: evt.target.result,
                        type: file.type
                    });
                    renderFileList();
                    imagePreview.classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        }

        // 渲染文档列表
        function renderFileList() {
            fileListBox.innerHTML = '';
            pendingFiles.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'file-preview-item';
                div.innerHTML = `<span>${item.name}</span><button onclick="removeFile(${idx})">删除</button>`;
                fileListBox.appendChild(div);
            });
        }

        // 删除单个文档
        window.removeFile = function(idx) {
            pendingFiles.splice(idx, 1);
            renderFileList();
            checkPreviewBarStatus();
        }

        // 清空图片
        window.clearImage = function() {
            pendingImage = null;
            previewImg.src = '';
            imgWrap.classList.remove('show');
            checkPreviewBarStatus();
        }

        // 判断预览栏是否隐藏
        function checkPreviewBarStatus() {
            if (!pendingImage && pendingFiles.length === 0) {
                imagePreview.classList.remove('active');
            }
        }

        // 用户消息渲染
        function appendUserMessage(text, imageUrl, fileNames) {
            const div = document.createElement('div');
            div.className = `message user`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (text) {
                const textDiv = document.createElement('div');
                textDiv.textContent = text;
                bubble.appendChild(textDiv);
            }
            if (fileNames && fileNames.length > 0) {
                const fileDiv = document.createElement('div');
                fileDiv.style.marginTop = '8px';
                fileDiv.textContent = `已上传文档：${fileNames.join('、')}`;
                bubble.appendChild(fileDiv);
            }
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.style.marginTop = '8px';
                bubble.appendChild(img);
            }

            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 创建带流程日志面板的助手气泡
        function createAssistantMessageWrap() {
            const msgWrap = document.createElement('div');
            msgWrap.className = 'message assistant';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            // 流程日志容器
            const logBox = document.createElement('div');
            logBox.className = 'agent-log-box';

            const logHeader = document.createElement('div');
            logHeader.className = 'agent-log-header';
            logHeader.innerHTML = `
                <span id="agent-log-title">正在思考</span>
                <button class="agent-log-toggle">收起</button>
            `;
            const toggleBtn = logHeader.querySelector('.agent-log-toggle');

            const logContent = document.createElement('div');
            logContent.className = 'agent-log-content';

            // 折叠切换逻辑
            toggleBtn.onclick = () => {
                logFoldState = !logFoldState;
                if (logFoldState) {
                    logContent.classList.add('fold');
                    toggleBtn.innerText = '展开';
                } else {
                    logContent.classList.remove('fold');
                    toggleBtn.innerText = '收起';
                }
            };

            logBox.appendChild(logHeader);
            logBox.appendChild(logContent);

            // 最终回答文本容器
            const answerText = document.createElement('div');
            answerText.className = 'final-answer-text';

            bubble.appendChild(logBox);
            bubble.appendChild(answerText);
            msgWrap.appendChild(bubble);
            chatContainer.appendChild(msgWrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return {
                wrap: msgWrap,
                logContentEl: logContent,
                answerEl: answerText,
                toggleBtn,
                titleEl: logHeader.querySelector('#agent-log-title')
            };
        }

        // 追加一行日志
        function appendLogLine(el, text) {
            const line = document.createElement('div');
            line.textContent = text;
            el.appendChild(line);
            el.scrollTop = el.scrollHeight;
        }
        function cleanMarkdown(text) {
            if (!text) return text;
            return text
                .replace(/#+\s*/g, '')                    // 去除标题标记
                .replace(/\*\*(.+?)\*\*/g, '$1')         // 去除粗体 **text**
                .replace(/\*(.+?)\*/g, '$1')             // 去除斜体 *text*
                .replace(/^[-*+]\s*/gm, '')              // 去除列表标记（空格可选）
                .replace(/[-]{3,}/g, '')                 // 去除分割线
                .replace(/`+/g, '')                      // 去除反引号
                .replace(/\n{2,}/g, '\n\n')              // 规范化换行
                .trim();
        }
        // 发送消息 POST流式Fetch（替代EventSource，解决405/422/URL超长）
        async function sendMessage() {
            if (currentMode === 'build') {
                if (!buildFiles.length) {
                    alert('请先上传文档');
                    return;
                }
                const fileNames = buildFiles.map(f => f.name);
                appendUserMessage('构建知识库', null, fileNames);
                sendBtn.disabled = true;
                sendBtn.textContent = '构建中...';

                const buildContentEl = appendBuildProgressMessage();

                try {
                    const response = await fetch("/build-knowledge", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ files: buildFiles })
                    });
                    if (!response.ok) throw new Error("接口请求异常");

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const blocks = buffer.split("\n\n");
                        buffer = blocks.pop();

                        for (const block of blocks) {
                            if (!block.startsWith("data: ")) continue;
                            const jsonStr = block.replace("data: ", "").trim();
                            if (!jsonStr) continue;
                            const data = JSON.parse(jsonStr);
                            if (data.type === 'log') {
                                addBuildLogText(buildContentEl, data.content);
                            } else if (data.type === 'progress') {
                                updateBuildFileStatus(buildContentEl, data.file, data.status, data.msg);
                            } else if (data.type === 'finish') {
                                addBuildLogText(buildContentEl, data.msg);
                            }
                        }
                    }
                } catch (err) {
                    addBuildLogText(buildContentEl, '构建异常：' + err.message);
                } finally {
                    buildFiles = [];
                    renderBuildFileList();
                    imagePreview.classList.remove('active');
                    sendBtn.disabled = false;
                    sendBtn.textContent = '上传并构建';
                }
                return;
            }

            const text = userInput.value.trim();
            if (!text && !pendingImage && pendingFiles.length === 0) return;

            // 记录思考开始时间
            const thinkStartTime = Date.now();

            // 关闭上一轮连接标记
            let abortController = new AbortController();

            const fileNames = pendingFiles.map(f => f.name);
            appendUserMessage(text, pendingImage, fileNames);

            const sendImage = pendingImage;
            const sendFiles = [...pendingFiles];

            // 清空输入区域
            pendingFiles = [];
            pendingImage = null;
            previewImg.src = '';
            imgWrap.classList.remove('show');
            renderFileList();
            imagePreview.classList.remove('active');
            userInput.value = '';
            userInput.style.height = 'auto';

            messages.push({ role: 'user', content: text || '[图片/文档]' });
            sendBtn.disabled = true;

            // 新建助手气泡，内置日志面板
            const res = createAssistantMessageWrap();
            currentAssistantWrap = res.wrap;
            currentLogContentEl = res.logContentEl;
            currentAnswerTextEl = res.answerEl;
            logFoldState = false;
            let fullAnswer = "";

            // 请求体
            const payload = {
                messages: messages,
                image_url: sendImage,
                upload_files: sendFiles
            };

            try {
                // POST请求流式读取
                const response = await fetch("/chat-stream", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload),
                    signal: abortController.signal
                });

                if (!response.ok) throw new Error("接口请求异常");

                // 流式解析SSE数据
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    // 按SSE换行分割data块
                    const blocks = buffer.split("\n\n");
                    buffer = blocks.pop();

                    for (const block of blocks) {
                        if (!block.startsWith("data: ")) continue;
                        const jsonStr = block.replace("data: ", "").trim();
                        if (!jsonStr) continue;
                        const data = JSON.parse(jsonStr);
                        switch (data.type) {
                            case "log":
                                appendLogLine(currentLogContentEl, data.content);
                                break;
                            case "answer":
                                // 第一次收到回答内容时，折叠思考框并更新标题
                                if (!fullAnswer) {
                                    const thinkDuration = ((Date.now() - thinkStartTime) / 1000).toFixed(1);
                                    res.titleEl.innerText = `已思考（用时${thinkDuration}秒）`;
                                    logFoldState = true;
                                    currentLogContentEl.classList.add('fold');
                                    res.toggleBtn.innerText = '展开';
                                }
                                const cleanChunk = cleanMarkdown(data.content);
                                fullAnswer += cleanChunk;
                                currentAnswerTextEl.innerText = fullAnswer;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                                break;
                            case "finish":
                                appendLogLine(currentLogContentEl, data.msg);
                                messages.push({ role: "assistant", content: fullAnswer });
                                break;
                        }
                    }
                }
            } catch (err) {
                appendLogLine(currentLogContentEl, "连接异常，请求中断：" + err.message);
                if (!fullAnswer) {
                    currentAnswerTextEl.innerText = "请求失败，请稍后重试";
                }
            } finally {
                sendBtn.disabled = false;
            }
        }
        // 点击空白预览区域唤起文件选择
        imagePreview.addEventListener('click', function(e) {
            if(e.target === imagePreview || e.target.id === 'fileListBox'){
                fileInput.click();
            }
        })
    </script>
</body>
</html>
