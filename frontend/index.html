<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 学习助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(90deg, #e6f1ff 0%, #f6efe0 30%, #f6efe0 70%, #e6f1ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .page-shell {
            width: min(100%, 1080px);
            max-width: 1080px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(77, 120, 184, 0.16);
            border-radius: 28px;
            box-shadow: 0 24px 58px rgba(22, 52, 100, 0.12);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .page-header {
            background: linear-gradient(135deg, #3c7dd9, #7bb3f5);
            color: #fff;
            padding: 18px 24px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .page-subtitle {
            color: rgba(238, 243, 254, 0.95);
            margin-top: 6px;
            font-size: 13px;
            opacity: 0.88;
        }
        .page-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 18px 22px 22px;
        }
        .chat-panel {
            background: linear-gradient(180deg, #fefcf6 0%, #eff8ff 100%);
            border: 1px solid rgba(118, 149, 210, 0.18);
            border-radius: 28px;
            padding: 16px;
            min-height: 360px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            margin-bottom: 10px;
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble {
            max-width: 78%;
            padding: 16px 18px;
            border-radius: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 10px 24px rgba(70, 108, 159, 0.08);
        }
        .message.user .bubble {
            background: #3d8be1;
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .message.assistant .bubble {
            background: #fff7eb;
            color: #1f3a5f;
            border: 1px solid rgba(227, 194, 149, 0.4);
            border-bottom-left-radius: 6px;
        }
        .message.user .bubble img,
        .message.assistant .bubble img {
            max-width: 100%;
            border-radius: 14px;
            display: block;
            margin-top: 12px;
        }
        .input-area {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: end;
            background: #ffffff;
            border: 1px solid rgba(77, 120, 184, 0.16);
            border-radius: 24px;
            padding: 18px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.45);
        }
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .image-preview-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(61, 139, 225, 0.08);
            border: 1px solid rgba(61, 139, 225, 0.2);
            border-radius: 16px;
        }
        .image-preview-bar.active { display: flex; }
        .image-preview-bar img {
            height: 60px;
            width: 60px;
            border-radius: 14px;
            border: 1px solid #dfe7f5;
            object-fit: cover;
        }
        .image-preview-bar button {
            height: 34px;
            padding: 0 12px;
            background: #fb6f55;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            border: 1px solid rgba(77, 120, 184, 0.18);
            border-radius: 18px;
            padding: 14px 16px;
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 40vh;
            min-height: 48px;
            line-height: 1.6;
            font-family: inherit;
            background: #f7f8fb;
            color: #1c2b4a;
            overflow: auto; /* allow scrolling but hide scrollbar visually */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE 10+ */
        }
        textarea::-webkit-scrollbar{display:none} /* Chrome/Safari */
        textarea:focus { border-color: #3d8be1; background: #fff; }
        button#sendBtn {
            height: 50px;
            min-width: 118px;
            padding: 0 24px;
            background: linear-gradient(135deg, #3c7dd9, #68a5ff);
            color: #fff;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        button#sendBtn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        button#sendBtn:disabled { background: #a7c7f7; cursor: not-allowed; transform: none; }
        .loading {
            color: #60779e;
            font-style: italic;
        }
        .drop-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(19, 72, 128, 0.34);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            z-index: 1000;
            pointer-events: none;
        }
        .drop-overlay.active { display: flex; }
        @media (max-width: 800px) {
            body { padding: 20px; }
            .page-shell { border-radius: 26px; }
            .page-content { padding: 22px 20px 26px; }
            .page-header { font-size: 22px; padding: 24px 20px; }
            .input-area { grid-template-columns: 1fr; }
            button#sendBtn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="page-header">
            AI 学习助手
        </div>
        <div class="page-content">
            <div class="chat-panel">
                <div class="chat-container" id="chatContainer"></div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="image-preview-bar" id="imagePreview">
                        <img id="previewImg" src="" alt="preview">
                        <button onclick="clearImage()">删除</button>
                    </div>
                    <textarea id="userInput" placeholder="输入消息，或拖拽图片到页面..." rows="1"></textarea>
                </div>
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
    <div class="drop-overlay" id="dropOverlay">释放以上传图片</div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const dropOverlay = document.getElementById('dropOverlay');
        let messages = [];
        let pendingImage = null; // base64 data URL

        // 自适应高度（根据视窗高度设上限），并隐藏可见滚动条
        function adjustInputHeight(el){
            el.style.height = 'auto';
            const max = Math.floor(window.innerHeight * 0.4); // 40vh
            const h = Math.min(el.scrollHeight, max);
            el.style.height = h + 'px';
        }
        adjustInputHeight(userInput);
        userInput.addEventListener('input', function() {
            adjustInputHeight(this);
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 拖拽逻辑
        let dragCounter = 0;
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropOverlay.classList.add('active');
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dropOverlay.classList.remove('active');
            }
        });
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleImageFile(files[0]);
            }
        });

        function handleImageFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(evt) {
                pendingImage = evt.target.result;
                previewImg.src = pendingImage;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            pendingImage = null;
            previewImg.src = '';
            imagePreview.classList.remove('active');
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendUserMessage(text, imageUrl) {
            const div = document.createElement('div');
            div.className = 'message user';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (text) {
                const textDiv = document.createElement('div');
                textDiv.textContent = text;
                bubble.appendChild(textDiv);
            }
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = 'uploaded';
                if (!text) img.style.marginTop = '0';
                bubble.appendChild(img);
            }
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !pendingImage) return;

            appendUserMessage(text, pendingImage);
            userInput.value = '';
            userInput.style.height = 'auto';

            const currentImage = pendingImage;
            clearImage();

            messages.push({ role: 'user', content: text || '[图片]' });

            sendBtn.disabled = true;

            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="bubble loading">思考中...</div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages, image_url: currentImage })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                appendMessage('assistant', data.content);
                messages.push({ role: 'assistant', content: data.content });
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('assistant', '请求失败，请稍后重试。');
            } finally {
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
