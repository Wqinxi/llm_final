<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #fff;
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            font-size: 18px;
            font-weight: 600;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            display: flex;
            margin-bottom: 16px;
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .bubble {
            background: #2d8cf0;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #fff;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        textarea {
            flex: 1;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 200px;
            min-height: 44px;
            line-height: 1.5;
            font-family: inherit;
        }
        textarea:focus { border-color: #2d8cf0; }
        button {
            height: 44px;
            padding: 0 20px;
            background: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1a7ae0; }
        button:disabled { background: #a0c4f0; cursor: not-allowed; }
        .loading { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">AI 智能助手</div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
        <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let messages = [];

        // 自适应高度：根据内容自动调整 textarea 高度
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            messages.push({ role: 'user', content: text });

            sendBtn.disabled = true;

            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="bubble loading">思考中...</div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages, image_url: null })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                appendMessage('assistant', data.content);
                messages.push({ role: 'assistant', content: data.content });
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('assistant', '请求失败，请稍后重试。');
            } finally {
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
